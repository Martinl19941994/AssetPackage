name: Upload Addressables to R2 (Upload Only)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  upload-only:
    runs-on: ubuntu-latest
    env:
      BUILD_TARGET: Android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install or update AWS CLI (robust)
        run: |
          set -euo pipefail

          # Helpers
          TMP_ZIP="awscliv2.zip"
          INSTALL_DIR="./aws-install"
          cleanup() {
            rm -f "${TMP_ZIP}"
            rm -rf "${INSTALL_DIR}"
          }
          trap cleanup EXIT

          echo "Checking existing aws installation..."
          if command -v aws >/dev/null 2>&1; then
            echo "AWS CLI detected: $(aws --version || true)"
            echo "Attempting to update AWS CLI v2 (installer will use --update)..."
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "${TMP_ZIP}"
            unzip -q "${TMP_ZIP}" -d "${INSTALL_DIR}"
            sudo "${INSTALL_DIR}/aws/install" --update || {
              echo "Installer update failed, falling back to pip install as alternative..."
              python3 -m pip install --upgrade pip setuptools wheel || true
              python3 -m pip install --upgrade awscli || true
            }
            echo "AWS CLI now: $(aws --version || true)"
          else
            echo "AWS CLI not found. Installing AWS CLI v2..."
            sudo apt-get update -y
            sudo apt-get install -y unzip python3-pip || true
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "${TMP_ZIP}"
            unzip -q "${TMP_ZIP}" -d "${INSTALL_DIR}"
            sudo "${INSTALL_DIR}/aws/install" || {
              echo "Installer failed, trying pip fallback..."
              python3 -m pip install --upgrade pip setuptools wheel || true
              python3 -m pip install --upgrade awscli || true
            }
            echo "AWS CLI installed: $(aws --version || true)"
          fi

      - name: Make upload script executable
        run: |
          if [[ -f "ci/upload_addressables.sh" ]]; then
            chmod +x ci/upload_addressables.sh
            echo "Script made executable."
          else
            echo "ERROR: ci/upload_addressables.sh not found in repository."
            exit 1
          fi

      - name: Upload Addressables to R2
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          echo "Starting upload script for target: ${{ env.BUILD_TARGET }}"
          ./ci/upload_addressables.sh "${{ env.BUILD_TARGET }}"

      - name: Verify catalog reachable
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          BUILD_TARGET: ${{ env.BUILD_TARGET }}
        run: |
          set -euo pipefail
          URL="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com/${R2_BUCKET}/Addressables/${BUILD_TARGET}/catalog.json"
          echo "Checking ${URL}"
          # Intentamos HEAD; si falla, mostramos un mensaje claro
          if curl -I -s -f "${URL}"; then
            echo "Catalog reachable via HTTP (public)."
          else
            echo "Catalog not reachable via public HTTP. If bucket is private, ensure Access Key has s3:GetObject or check presigned URL generation."
            exit 1
          fi
