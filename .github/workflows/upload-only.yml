name: Upload Addressables to R2 (Upload Only)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  upload-only:
    runs-on: ubuntu-latest
    env:
      BUILD_TARGET: Android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install

      - name: Make upload script executable
        run: chmod +x ci/upload_addressables.sh

      - name: Upload Addressables to R2
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          ./ci/upload_addressables.sh "${{ env.BUILD_TARGET }}"

      - name: Verify catalog reachable
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          URL="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com/${R2_BUCKET}/Addressables/${{ env.BUILD_TARGET }}/catalog.json"
          echo "Checking ${URL}"
          curl -I -f "${URL}"
